steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/odyssey-web', '-f', 'infrastructure/docker/Dockerfile.web', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/odyssey-api', '-f', 'infrastructure/docker/Dockerfile.api', '.']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - odyssey-api
      - '--image=gcr.io/$PROJECT_ID/odyssey-api'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'
      - '--set-secrets=GOOGLE_MAPS_API_KEY=maps-api-key:latest'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--memory=2Gi'
      - '--cpu=2'

